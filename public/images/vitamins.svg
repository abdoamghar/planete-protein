<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <rect width="600" height="600" fill="#0a0a0c"/>
  <rect x="40" y="40" width="520" height="520" rx="20" fill="none" stroke="#DFFF00" stroke-width="2" stroke-dasharray="8 4" opacity="0.3"/>
  <g transform="translate(300,260)">
    <!-- Bottle body -->
    <rect x="-70" y="-40" width="140" height="180" rx="12" fill="#DFFF00"/>
    <rect x="-70" y="-40" width="140" height="50" rx="12" fill="#1a1a20"/>
    <rect x="-70" y="-10" width="140" height="4" fill="#DFFF00" opacity="0.3"/>
    <!-- Cap -->
    <rect x="-50" y="-60" width="100" height="24" rx="6" fill="#DFFF00"/>
    <rect x="-50" y="-60" width="100" height="10" rx="6" fill="#cbe600"/>
    <!-- Label text -->
    <text x="0" y="50" font-family="Oswald,sans-serif" font-size="22" font-weight="900" fill="#0a0a0c" text-anchor="middle" text-transform="uppercase" letter-spacing="2">MULTI</text>
    <text x="0" y="78" font-family="Oswald,sans-serif" font-size="16" font-weight="700" fill="#0a0a0c" text-anchor="middle" text-transform="uppercase" letter-spacing="1">VITAMIN</text>
  </g>
  <!-- Tablets scattered -->
  <g opacity="0.4">
    <ellipse cx="180" cy="480" rx="18" ry="10" fill="#DFFF00"/>
    <ellipse cx="420" cy="500" rx="15" ry="8" fill="#DFFF00"/>
    <ellipse cx="150" cy="160" rx="12" ry="7" fill="#DFFF00"/>
    <ellipse cx="450" cy="150" rx="14" ry="8" fill="#DFFF00"/>
  </g>
  <!-- Decorative pills -->
  <g opacity="0.6">
    <rect x="160" y="100" width="40" height="16" rx="8" fill="#DFFF00" transform="rotate(-20,180,108)"/>
    <rect x="400" y="470" width="36" height="14" rx="7" fill="#DFFF00" transform="rotate(15,418,477)"/>
  </g>
</svg>