<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <rect width="600" height="600" fill="#0a0a0c"/>
  <rect x="40" y="40" width="520" height="520" rx="20" fill="none" stroke="#DFFF00" stroke-width="2" stroke-dasharray="8 4" opacity="0.3"/>
  <g transform="translate(300,280)">
    <!-- Tub -->
    <ellipse cx="0" cy="-60" rx="95" ry="25" fill="#1a1a20"/>
    <rect x="-95" y="-60" width="190" height="130" rx="0" fill="#121215"/>
    <ellipse cx="0" cy="70" rx="95" ry="25" fill="#1a1a20"/>
    <rect x="-95" y="-60" width="190" height="130" rx="0" fill="none" stroke="#333" stroke-width="1"/>
    <!-- Rim -->
    <ellipse cx="0" cy="-60" rx="100" ry="28" fill="none" stroke="#DFFF00" stroke-width="3"/>
    <!-- Scoop -->
    <g transform="translate(80,-30)">
      <ellipse cx="0" cy="0" rx="22" ry="12" fill="#DFFF00" opacity="0.7"/>
      <rect x="-22" y="0" width="44" height="30" rx="4" fill="#DFFF00" opacity="0.7"/>
      <rect x="-4" y="30" width="8" height="50" rx="3" fill="#DFFF00" opacity="0.5"/>
    </g>
    <!-- Label -->
    <text x="0" y="0" font-family="Oswald,sans-serif" font-size="28" font-weight="900" fill="#DFFF00" text-anchor="middle" text-transform="uppercase" letter-spacing="3">BCAA</text>
    <text x="0" y="30" font-family="Oswald,sans-serif" font-size="18" font-weight="700" fill="#888892" text-anchor="middle" text-transform="uppercase" letter-spacing="2">ENERGY</text>
  </g>
  <!-- Lightning bolts -->
  <g opacity="0.3">
    <polygon points="120,140 140,140 130,180 150,180 125,230 140,180 120,180 135,140" fill="#DFFF00"/>
    <polygon points="460,400 480,400 470,440 490,440 465,490 480,440 460,440 475,400" fill="#DFFF00"/>
  </g>
</svg>