<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <rect width="600" height="600" fill="#0a0a0c"/>
  <rect x="40" y="40" width="520" height="520" rx="20" fill="none" stroke="#DFFF00" stroke-width="2" stroke-dasharray="8 4" opacity="0.3"/>
  <g transform="translate(300,280)">
    <!-- Shaker body -->
    <path d="M-60,80 L-60,-60 Q-60,-80 -40,-80 L40,-80 Q60,-80 60,-60 L60,80 Z" fill="#1a1a20" stroke="#333" stroke-width="1"/>
    <!-- Steel gradient effect -->
    <path d="M-60,80 L-60,-60 Q-60,-80 -40,-80 L0,-80 L0,80 Z" fill="#2a2a30" opacity="0.5"/>
    <!-- Lid -->
    <rect x="-45" y="-95" width="90" height="18" rx="4" fill="#DFFF00"/>
    <rect x="-45" y="-95" width="90" height="8" rx="4" fill="#cbe600"/>
    <!-- Spout -->
    <ellipse cx="-20" cy="-95" rx="15" ry="6" fill="#121215" stroke="#DFFF00" stroke-width="1.5"/>
    <ellipse cx="-20" cy="-98" rx="10" ry="4" fill="#DFFF00"/>
    <!-- Brand label -->
    <rect x="-40" y="-30" width="80" height="50" rx="4" fill="#0a0a0c" stroke="#DFFF00" stroke-width="1"/>
    <text x="0" y="-4" font-family="Oswald,sans-serif" font-size="15" font-weight="900" fill="#DFFF00" text-anchor="middle" text-transform="uppercase" letter-spacing="1">STEEL</text>
    <text x="0" y="14" font-family="Oswald,sans-serif" font-size="11" font-weight="700" fill="#888892" text-anchor="middle" text-transform="uppercase">SHAKER</text>
  </g>
  <!-- Ice cubes floating -->
  <g opacity="0.2">
    <rect x="150" y="140" width="30" height="30" rx="4" fill="#DFFF00" transform="rotate(15,165,155)"/>
    <rect x="420" y="450" width="25" height="25" rx="4" fill="#DFFF00" transform="rotate(-10,432,462)"/>
    <rect x="130" y="440" width="20" height="20" rx="3" fill="#DFFF00" transform="rotate(30,140,450)"/>
  </g>
</svg>